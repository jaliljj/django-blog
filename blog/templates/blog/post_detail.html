{% extends 'base.html' %}

{% block content %}
    عنوان پست: {{ post.title }}
    محتوا: {{ post.content }}
    {% if post.image %}
        <p>تصویر:</p>
        <img src="{{ post.image.url }}" alt="{{ post.title }}">
    {% endif %}
    تاریخ:{{ post.created_at }}
    <a href="{% url 'edit_post' post.pk %}">ویرایش</a>
    <a href="{% url 'delete_post' post.pk %}">حذف</a>
{% endblock %}
