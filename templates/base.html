<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}سایت من{% endblock %}</title>
</head>
<body>

        <h1>وبلاگ من</h1>
        <nav>
            <a href="/blog/">خانه</a> |
            <a href="/blog/about/">درباره ما</a> |
            <a href="/blog/create_post/">پست جدید</a>

    <footer>
        <p>© 2026</p>
    </footer>

</html>
